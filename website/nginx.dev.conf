server {
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 安全 headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 无尾斜杠时重定向到 /dev/
    # absolute_redirect off：发送相对路径 Location，浏览器用当前 origin 解析，
    # 无论有无反向代理、端口是 80 还是 8080 均正确
    location = /dev {
        absolute_redirect off;
        return 301 /dev/;
    }

    location = / {
        absolute_redirect off;
        return 301 /dev/;
    }

    # 静态资源 — 剥掉 /dev 前缀后命中磁盘路径，长缓存
    location ~* ^/dev/assets/ {
        rewrite ^/dev/(.+)$ /$1 break;
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 文档站 — VitePress SPA，alias 剥掉 /dev 前缀，路由 fallback 到 index.html
    location /dev {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ $uri.html @dev_fallback;
    }

    location @dev_fallback {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
}
